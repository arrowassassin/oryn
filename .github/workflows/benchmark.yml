name: benchmark

# Manual, on-demand benchmark of oryn against real Cargo workspaces.
# Run from the Actions tab ("Run workflow"). With no `repo` input it benchmarks
# a default matrix of repos; pass a `repo` URL to benchmark just that one.
on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Optional single Cargo workspace URL (overrides the matrix)"
        required: false
        default: ""
      with_fn:
        description: "Also benchmark coverage + --fn (slow)"
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        env:
          REPO: ${{ inputs.repo }}
        run: |
          if [ -n "$REPO" ]; then
            matrix=$(jq -nc --arg u "$REPO" '{include:[{name:"custom",url:$u}]}')
          else
            matrix='{"include":[
              {"name":"ripgrep","url":"https://github.com/BurntSushi/ripgrep"},
              {"name":"tokio","url":"https://github.com/tokio-rs/tokio"}
            ]}'
          fi
          # collapse whitespace and emit
          echo "matrix=$(echo "$matrix" | tr -d '\n ' )" >> "$GITHUB_OUTPUT"

  bench:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the toolchain; add the coverage component to it.
      - name: Add llvm-tools (for `oryn cover`)
        run: rustup component add llvm-tools-preview

      - name: Install mold + clang (so the linker lever is measurable)
        run: sudo apt-get update && sudo apt-get install -y mold clang

      - name: Build oryn (release)
        run: cargo build --release -p oryn

      - name: Clone target (${{ matrix.name }})
        run: git clone --depth 1 "${{ matrix.url }}" /tmp/target

      - name: Run benchmark (${{ matrix.name }})
        env:
          BENCH_OUT: ${{ github.workspace }}/bench-${{ matrix.name }}.txt
          WITH_FN: ${{ inputs.with_fn && '1' || '0' }}
        run: bash bench/run.sh /tmp/target

      - name: Publish results to the run summary
        if: always()
        run: |
          {
            echo "### ${{ matrix.name }}"
            echo '```'
            cat "bench-${{ matrix.name }}.txt" 2>/dev/null || echo "(no results — see job log)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-${{ matrix.name }}
          path: bench-${{ matrix.name }}.txt
