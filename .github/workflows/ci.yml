name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # The whole workspace is headless (engine + CUDA CPU-reference + HTTP API +
  # CLI) with no GUI/system dependencies, so one fast job covers everything.
  # CUDA kernels are only compiled when the `cuda` feature is set and `nvcc` is
  # present; CI exercises the tested CPU reference path.
  build:
    name: workspace (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.96
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
