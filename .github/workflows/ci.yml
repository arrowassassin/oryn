name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast gate: the headless engine has no GUI/system dependencies, so it builds,
  # lints, and tests quickly and catches the bulk of regressions.
  core:
    name: core (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy -p oryn-core --all-targets -- -D warnings
      - name: Test
        run: cargo test -p oryn-core

  # Full workspace: builds and tests the GPUI desktop app too, which needs the
  # same Linux system libraries Zed/GPUI require.
  app:
    name: workspace (build · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (GPUI / Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config cmake clang mold \
            libssl-dev libfontconfig-dev libfreetype6-dev \
            libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libgbm-dev libdrm-dev \
            libvulkan-dev mesa-vulkan-drivers \
            libasound2-dev libudev-dev xorg-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
