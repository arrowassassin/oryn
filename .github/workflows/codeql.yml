name: CodeQL

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    # Weekly scan so the default branch keeps getting analyzed.
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            # Rust analysis builds from source without a project build, so no
            # GPUI/Linux system dependencies are required here.
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
